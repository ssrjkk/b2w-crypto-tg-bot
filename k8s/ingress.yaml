apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-platform-ingress
  namespace: crypto-platform
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-max-queue-size: "1024"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
  - host: crypto.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crypto-platform-api
            port:
              number: 80
  - path: /ws
    pathType: Prefix
    backend:
      service:
        name: crypto-platform-api
        port:
          number: 80
  tls:
  - hosts:
    - crypto.yourdomain.com
    secretName: crypto-platform-tls
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
spec:
  controller: k8s.io/ingress-nginx
