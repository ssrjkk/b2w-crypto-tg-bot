apiVersion: v1
kind: ConfigMap
metadata:
  name: crypto-platform-config
  namespace: crypto-platform
data:
  redis-url: "redis://redis:6379/0"
  celery-broker-url: "redis://redis:6379/0"
  celery-result-backend: "redis://redis:6379/1"
---
apiVersion: v1
kind: Secret
metadata:
  name: crypto-platform-secret
  namespace: crypto-platform
type: Opaque
stringData:
  database-url: "postgresql://postgres:password@postgres:5432/platform"
  telegram-bot-token: "YOUR_BOT_TOKEN_HERE"
  sentry-dsn: ""
