apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-platform-api
  namespace: crypto-platform
  labels:
    app: crypto-platform
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-platform
      component: api
  template:
    metadata:
      labels:
        app: crypto-platform
        component: api
    spec:
      containers:
      - name: api
        image: crypto-platform:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE__PATH
          valueFrom:
            secretKeyRef:
              name: crypto-platform-secret
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: crypto-platform-config
              key: redis-url
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: crypto-platform-secret
              key: telegram-bot-token
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: crypto-platform-config
              key: celery-broker-url
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: crypto-platform-config
              key: celery-result-backend
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - name: app-data
          mountPath: /app/data
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: crypto-platform-data
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-platform-api
  namespace: crypto-platform
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: crypto-platform
    component: api
